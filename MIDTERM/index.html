<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Discovery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        [data-bs-theme="dark"] .instruction-full {
            color: white !important;
        }

        [data-bs-theme="dark"] .navbar-brand span {
            color: white !important;
        }


    </style>

</head>

<body class="bg-body" id="main-body" data-bs-theme="light"></body>

    <nav class="navbar navbar-expand-lg border-bottom sticky-top py-3 bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">MEAL<span>DB</span></a>

        <div class="d-flex align-items-center gap-3 w-50">
            <input class="form-control rounded-pill border-2" type="search" id="searchInput"
                placeholder="Search by name or category...">

             <button class="btn btn-outline-secondary rounded-circle" id="themeToggler" onclick="toggleTheme()">
            🌙
            </button>
        </div>
    </div>
</nav>

<div class="container my-5">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="fw-bold">Browse Recipes</h2>
            <p class="text-muted">Click any card to see full preparation details.</p>
        </div>
    </div>
    <div id="meal-container" class="row g-4">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="recipeModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header border-0 pb-0">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body pt-0 text-light opacity-75" id="modal-content">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function toggleTheme() {
        const body = document.getElementById('main-body');
        const btn = document.getElementById('themeToggler');

        if (body.getAttribute('data-bs-theme') === 'light') {
            body.setAttribute('data-bs-theme', 'dark');
            btn.innerHTML = '☀️';
            btn.classList.replace('btn-outline-secondary', 'btn-outline-warning');
        } else {
            body.setAttribute('data-bs-theme', 'light');
            btn.innerHTML = '🌙';
            btn.classList.replace('btn-outline-warning', 'btn-outline-secondary');
        }
    }
</script>

<script src="script.js"></script>
</body>

</html>

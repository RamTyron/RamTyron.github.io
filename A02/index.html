<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramitron - Asus Zenbook 14 OLED</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .cart {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .hero {
            max-width: 1200px;
            margin: 120px auto 0;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            min-height: 70vh;
        }

        .product-image {
            text-align: center;
        }

       
        .laptop-img {
            width: 100%;
            max-width: 550px;
            height: auto;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.3));
           
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .product-info {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .product-title {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #333;
            line-height: 1.2;
        }

        .product-subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 2rem;
        }

        .specs {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 2rem;
            border-radius: 20px;
            margin: 2rem 0;
        }

        .specs h3 {
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }

        .specs ul {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .specs li {
            display: flex;
            align-items: center;
            font-size: 1rem;
        }

        .specs li::before {
            content: "✅";
            margin-right: 0.5rem;
        }

        .product-price {
            font-size: 3.5rem;
            font-weight: bold;
            color: #27ae60;
            margin: 2rem 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .buy-btn {
            width: 100%;
            background: linear-gradient(45deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            border: none;
            padding: 1.5rem;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
            text-transform: uppercase;
        }

        .buy-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 107, 107, 0.6);
        }

        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .cart-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem;
            border-radius: 25px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .close-cart {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 2.5rem;
            cursor: pointer;
            color: white;
        }

        .cart-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 2rem;
            border-radius: 15px;
            margin: 2rem 0;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 1rem 0;
        }

        .quantity-btn {
            background: rgba(255, 255, 255, 0.3);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            color: white;
        }

        .total {
            font-size: 2rem;
            font-weight: bold;
            margin: 2rem 0;
            color: #ffd700;
        }

        .checkout-btn {
            width: 100%;
            background: linear-gradient(45deg, #27ae60 0%, #2ecc71 100%);
            color: white;
            border: none;
            padding: 1.5rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .hero {
                grid-template-columns: 1fr;
                margin-top: 100px;
                text-align: center;
            }
            .product-title { font-size: 2rem; }
            .specs ul { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

    <header>
        <nav>
            <div class="logo">Ramitron</div>
            <div class="cart" onclick="toggleCart()">
                🛒
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </nav>
    </header>

    <section class="hero">
        <div class="product-image">
            <img src="asus-zenbook-14-oled-ux3405ma-pp678wsm-14-oled-intel-core-ultra-5-125h-intel-arc-graphics-16-gb-ram-1-tb-ssd-win-11-asus-gigahertz-431881.webp" 
                 alt="Asus Zenbook 14 OLED" 
                 class="laptop-img">
        </div>

        <div class="product-info">
            <h1 class="product-title">Asus Zenbook 14 OLED UX3405MA</h1>
            <p class="product-subtitle">Premium Ultraportable Laptop</p>

            <div class="specs">
                <h3>Zenbook Series (Premium & Portable)</h3>
                <ul>
                    <li>14" 3K OLED</li>
                    <li>Intel Core Ultra 5 125H</li>
                    <li>Intel Arc Graphics</li>
                    <li>16 GB RAM</li>
                    <li>1 TB SSD</li>
                    <li>Windows 11</li>
                </ul>
            </div>

            <div class="product-price">₱62,999</div>

            <button class="buy-btn" onclick="addToCart()">
                🛒 Add to Cart
            </button>
        </div>
    </section>

    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <span class="close-cart" onclick="toggleCart()">&times;</span>
            <h2>🛒 Shopping Cart</h2>
            <div id="cartItems" class="cart-item">
                <p>Your cart is empty</p>
            </div>
            <div class="total" id="cartTotal">Total: ₱0</div>
            <button class="checkout-btn" onclick="checkout()">💳 Buy Now - Proceed to Payment</button>
        </div>
    </div>

    <script>
        let cartQuantity = 0;
        const laptopPrice = 62999;

        function updateCartCount() {
            document.getElementById('cartCount').textContent = cartQuantity;
        }

        function addToCart() {
            cartQuantity++;
            updateCartCount();
            showNotification('✅ Zenbook added to cart!');
            renderCart();
        }

        function toggleCart() {
            const modal = document.getElementById('cartModal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }

        function renderCart() {
            const cartItems = document.getElementById('cartItems');
            const total = cartQuantity * laptopPrice;

            if (cartQuantity === 0) {
                cartItems.innerHTML = '<p>Your cart is empty 😢</p>';
                document.getElementById('cartTotal').textContent = 'Total: ₱0';
            } else {
                cartItems.innerHTML = `
                    <h3>ASUS Zenbook 14 OLED</h3>
                    <div class="quantity-controls">
                        <button class="quantity-btn" onclick="changeQuantity(-1)">−</button>
                        <span style="font-size: 1.5rem; font-weight: bold;">${cartQuantity}</span>
                        <button class="quantity-btn" onclick="changeQuantity(1)">+</button>
                    </div>
                    <p>₱${laptopPrice.toLocaleString()} x ${cartQuantity}</p>
                `;
                document.getElementById('cartTotal').textContent = `Total: ₱${total.toLocaleString()}`;
            }
        }

        function changeQuantity(delta) {
            cartQuantity = Math.max(0, cartQuantity + delta);
            updateCartCount();
            renderCart();
        }

        function checkout() {
            if (cartQuantity === 0) return alert('Cart is empty!');
            const total = cartQuantity * laptopPrice;
            if (confirm(`Total: ₱${total.toLocaleString()}\nProceed to payment?`)) {
                alert(`PURCHASE SUCCESSFUL!\nOrder #${Math.floor(Math.random() * 1000000)}`);
                cartQuantity = 0;
                updateCartCount();
                toggleCart();
            }
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed; top: 100px; right: 20px;
                background: #27ae60; color: white; padding: 1rem;
                border-radius: 10px; z-index: 3000; font-weight: bold;
                animation: slideIn 0.4s ease forwards;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.4s ease forwards';
                setTimeout(() => notification.remove(), 400);
            }, 2000);
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
            @keyframes slideOut { from { transform: translateX(0); } to { transform: translateX(100%); } }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
